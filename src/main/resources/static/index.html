<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách UET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Hệ thống Quản lý Sách (JDBC thuần)</h2>

<div class="card p-3 mb-4">
    <div class="row g-3">
        <div class="col">
            <input type="text" id="title" class="form-control" placeholder="Tên sách">
        </div>
        <div class="col">
            <input type="text" id="author" class="form-control" placeholder="Tác giả">
        </div>
        <div class="col">
            <button onclick="addBook()" class="btn btn-success">Thêm sách</button>
        </div>
    </div>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Tác giả</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody id="bookTable"></tbody>
</table>

<script>
    // Hàm load danh sách từ API (Gọi đến Controller -> Service -> Repository)
    function loadBooks() {
        fetch('/api/books')
            .then(res => res.json())
            .then(response => { // Đổi tên từ data thành response cho đỡ nhầm
                console.log("Dữ liệu nhận về:", response);

                // Thay vì dùng response.forEach, hãy dùng response.data.forEach
                // (Hoặc chỉ dùng response nếu bạn KHÔNG dùng ResponseObject ở Java)
                const list = Array.isArray(response) ? response : response.data;

                let rows = '';
                if (list) {
                    list.forEach(b => {
                        rows += `<tr>
                        <td>${b.id}</td>
                        <td>${b.title}</td>
                        <td>${b.author}</td>
                        <td>
                            <button onclick="deleteBook(${b.id})" class="btn btn-danger btn-sm">Xóa</button>
                        </td>
                    </tr>`;
                    });
                }
                document.getElementById('bookTable').innerHTML = rows;
            })
            .catch(err => console.error("Lỗi fetch API:", err));
    }

    function addBook() {
        const title = document.getElementById('title').value;
        const author = document.getElementById('author').value;
        fetch('/api/books', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title, author})
        }).then(() => {
            loadBooks();
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
        });
    }

    function deleteBook(id) {
        if(confirm('Bạn có chắc muốn xóa?')) {
            fetch('/api/books/' + id, { method: 'DELETE' })
                .then(() => loadBooks());
        }
    }

    // Tự động chạy khi mở trang
    loadBooks();
</script>
</body>
</html>
