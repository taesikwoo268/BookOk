<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chỉnh sửa sách</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-warning">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Chỉnh sửa thông tin sách</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/web/books/update/{id}(id=${book.id})}" th:object="${book}" method="post">
                        <input type="hidden" th:field="*{id}"> <div class="mb-3">
                        <label class="form-label">Tiêu đề sách</label>
                        <input type="text" th:field="*{title}" class="form-control" required>
                    </div>
                        <div class="mb-3">
                            <label class="form-label">Tác giả</label>
                            <input type="text" th:field="*{author}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thể loại hiện tại: <span class="badge bg-info text-dark" th:text="*{categoryName}"></span></label>
                            <select class="form-select" th:field="*{categoryName}" required>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.name}"
                                        th:text="${cat.name}"
                                        th:selected="${cat.name == book.categoryName}"></option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Cập nhật thay đổi</button>
                            <a th:href="@{/web/books}" class="btn btn-secondary">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
