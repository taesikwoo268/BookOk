<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Shopee Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Màu chủ đạo Shopee: #ee4d2d */
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-bg: #f5f5f5;
        }

        body {
            background-color: var(--shopee-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .main-content {
            flex: 1;
            padding-top: 20px;
            padding-bottom: 50px;
        }

        /* Tùy chỉnh Navbar giống Shopee */
        .navbar-shopee {
            background: linear-gradient(-180deg, #f53d2d, #f63);
            padding: 0.5rem 0;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: white !important;
        }

        .footer {
            background-color: white;
            border-top: 4px solid var(--shopee-orange);
            color: #555;
        }

        /* Nút bấm kiểu Shopee */
        .btn-shopee {
            background-color: var(--shopee-orange);
            color: white;
            border: none;
        }
        .btn-shopee:hover {
            background-color: #d73211;
            color: white;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main layout:fragment="content" class="container main-content">
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
