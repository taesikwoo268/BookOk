<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Trang chủ - Shopee Book</title>
    <style>
        .category-sidebar { background: white; padding: 15px; border-radius: 2px; }
        .product-card {
            background: white; border-radius: 2px; transition: transform 0.1s;
            border: 1px solid transparent; height: 100%; position: relative;
            display: flex; flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-2px); border: 1px solid #ee4d2d;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-title {
            font-size: 0.8rem; line-height: 1.2rem; height: 2.4rem;
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            color: rgba(0,0,0,.87); margin-bottom: 5px;
        }
        .product-price { color: #ee4d2d; font-size: 1.1rem; }
        .mall-badge {
            background-color: #d0011b; color: white; font-size: 10px;
            padding: 0 4px; border-radius: 2px; font-weight: bold;
            position: absolute; top: 5px; left: 5px; z-index: 1;
        }
        .page-item.active .page-link {
            background-color: #ee4d2d !important;
            border-color: #ee4d2d !important;
            color: white !important;
        }
        /* Hiệu ứng khi hover vào danh mục */
        .category-link:hover { color: #ee4d2d !important; }
        .category-active { color: #ee4d2d !important; font-weight: bold; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="row">
        <div class="col-md-2">
            <div class="category-sidebar shadow-sm">
                <form th:action="@{/web/books}" method="get" id="filterForm">
                    <input type="hidden" name="keyword" th:value="${keyword}">

                    <h6 class="fw-bold mb-3"><i class="bi bi-list-ul"></i> THEO DANH MỤC</h6>
                    <div class="category-list mb-3" style="max-height: 200px; overflow-y: auto;">
                        <div th:each="cat : ${allCategories}" class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="categories"
                                   th:value="${cat.name}"
                                   th:id="'cat-' + ${cat.id}"
                                   th:checked="${selectedCategories != null && selectedCategories.contains(cat.name)}">
                            <label class="form-check-label small" th:for="'cat-' + ${cat.id}" th:text="${cat.name}"></label>
                        </div>
                    </div>

                    <hr>

                    <h6 class="fw-bold mb-3">BỘ LỌC TÌM KIẾM</h6>
                    <div class="small mb-2">Khoảng giá</div>
                    <input type="number" name="minPrice" th:value="${minPrice}" class="form-control form-control-sm mb-2" placeholder="₫ TỪ">
                    <input type="number" name="maxPrice" th:value="${maxPrice}" class="form-control form-control-sm mb-2" placeholder="₫ ĐẾN">

                    <button type="submit" class="btn btn-danger btn-sm w-100 mt-3 fw-bold">ÁP DỤNG</button>
                    <a th:href="@{/web/books}" class="btn btn-light btn-sm w-100 mt-2 border small">XÓA TẤT CẢ</a>
                </form>
            </div>
        </div>

        <div class="col-md-10">
            <div class="d-flex align-items-center bg-white p-3 mb-3 shadow-sm rounded">
                <span class="me-3 small">Sắp xếp theo</span>
                <button class="btn btn-danger btn-sm me-2">Phổ biến</button>
                <button class="btn btn-light btn-sm me-2 border">Mới nhất</button>

                <div class="ms-auto" sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/web/books/add}" class="btn btn-outline-danger btn-sm fw-bold">
                        <i class="bi bi-plus-lg"></i> THÊM SÁCH MỚI
                    </a>
                </div>
            </div>

            <div class="row row-cols-2 row-cols-md-5 g-2">
                <div class="col" th:each="book : ${books}">
                    <div class="product-card shadow-sm p-2">
                        <span class="mall-badge">Mall</span>
                        <img src="https://thanhnien.mediacdn.vn/Uploaded/minhnguyet/2022_05_08/bia-sach2-9886.jpg" class="product-img mb-2">

                        <div class="product-title" th:text="${book.title}"></div>

                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="product-price">
                                    ₫<span th:text="${book.price != null ? #numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT') : '0'}"></span>
                                </div>
                                <div class="text-muted" style="font-size: 10px;">Đã bán 1.2k</div>
                            </div>

                            <div class="mt-2 pt-2 border-top d-flex justify-content-between" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/web/books/edit/{id}(id=${book.id})}" class="text-warning text-decoration-none small"><i class="bi bi-pencil"></i> Sửa</a>
                                <a th:href="@{/web/books/delete/{id}(id=${book.id})}" class="text-danger text-decoration-none small" onclick="return confirm('Xóa cuốn này?')"><i class="bi bi-trash"></i> Xóa</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5 bg-white" th:if="${books.isEmpty()}">
                    <p class="text-muted">Không tìm thấy sản phẩm nào trong danh mục này.</p>
                </div>
            </div>

            <nav class="mt-5" th:if="${totalPages > 0}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link border-0 text-muted"
                           th:href="@{/web/books(page=${currentPage - 1}, keyword=${keyword}, minPrice=${minPrice}, maxPrice=${maxPrice}, category=${category})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link border-0 rounded"
                           th:href="@{/web/books(page=${i}, keyword=${keyword}, minPrice=${minPrice}, maxPrice=${maxPrice}, category=${category})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link border-0 text-muted"
                           th:href="@{/web/books(page=${currentPage + 1}, keyword=${keyword}, minPrice=${minPrice}, maxPrice=${maxPrice}, category=${category})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
