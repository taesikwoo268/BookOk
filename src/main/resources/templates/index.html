<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout}"> <head>
    <title>Danh sách sách</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý thư viện</h2>
        <form class="d-flex" th:action="@{/web/books}" method="get">
            <input class="form-control me-2" type="search" name="keyword" th:value="${keyword}" placeholder="Tìm tên sách...">
            <button class="btn btn-outline-success" type="submit">Tìm</button>
        </form>
    </div>

    <table class="table table-hover table-striped shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tiêu đề</th>
            <th>Tác giả</th>
            <th>Thể loại</th>
            <th sec:authorize="hasRole('ADMIN')">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td class="fw-bold" th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td><span class="badge bg-info text-dark" th:text="${book.categoryName}"></span></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/web/books/edit/{id}(id=${book.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/web/books/delete/{id}(id=${book.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa nhé?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/web/books(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/web/books(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/web/books(page=${currentPage + 1}, keyword=${keyword})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
