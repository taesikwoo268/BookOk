<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách UET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Danh sách sách</h2>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Tác giả</th>
        <th>Thể loại</th> <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.categoryName}"></td> <td>
        <a th:href="@{/web/books/edit/{id}(id=${book.id})}">Sửa</a> |
        <a th:href="@{/web/books/delete/{id}(id=${book.id})}"
           onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
    </td>
    </tr>
    </tbody>
</table>
</body>
</html>
